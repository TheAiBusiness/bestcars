# Nixpacks: build y start del backend
# Railway usa este archivo cuando builder = "nixpacks" (railway.toml)
# Root Directory del servicio: Bestcars_Back_DEF

[phases.install]
cmds = ["npm ci", "npx prisma generate"]

[phases.build]
cmds = ["npm run build"]

[start]
# Si hay DATABASE_URL, aplica el schema antes de arrancar. Si push falla, arrancar igual (ej. sin DB = modo mock).
cmd = "sh -c 'if [ -n \"$DATABASE_URL\" ]; then npx prisma db push --accept-data-loss || true; fi && npm start'"
