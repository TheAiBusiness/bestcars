# Nixpacks: build y start del backend
# Railway usa este archivo cuando builder = "nixpacks" (railway.toml)
# Root Directory del servicio: Bestcars_Back_DEF

[phases.install]
cmds = ["npm ci", "npx prisma generate"]

[phases.build]
cmds = ["npm run build"]

[start]
# Solo arrancar la API. No ejecutar prisma db push aquí: con Supabase pooler (6543) puede colgar el deploy.
# Ejecuta "npx prisma db push" una vez desde local o Railway one-off usando DIRECT_DATABASE_URL (puerto 5432).
cmd = "npm start"
